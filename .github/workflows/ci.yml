name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - run: ruff check .

      - run: pytest -q

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare .env
        run: |
          cp .env.example .env
          sed -i 's/^POSTGRES_PASSWORD=.*/POSTGRES_PASSWORD=ci_secret/' .env
          sed -i 's|^DATABASE_URL=.*|DATABASE_URL=postgresql+psycopg://academicguide:ci_secret@postgres:5432/academicguide|' .env

      - name: Start stack
        run: docker compose up -d --build postgres backend frontend

      - name: Wait for backend
        run: |
          for i in {1..40}; do
            if curl -fs http://localhost:8000/health; then
              echo "backend ready"; exit 0
            fi
            sleep 3
          done
          docker compose logs backend
          exit 1

      - name: Wait for frontend
        run: |
          for i in {1..40}; do
            if curl -fs http://localhost:5173 > /dev/null; then
              echo "frontend ready"; exit 0
            fi
            sleep 3
          done
          docker compose logs frontend
          exit 1

      - name: Install e2e deps
        working-directory: e2e
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: e2e
        env:
          FRONTEND_URL: http://localhost:5173
        run: npm test

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          if-no-files-found: ignore
