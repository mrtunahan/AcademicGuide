name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps (CPU torch)
        run: |
          pip install --upgrade pip
          pip install --extra-index-url https://download.pytorch.org/whl/cpu torch==2.5.1
          pip install -r requirements.txt

      - run: ruff check .

      - run: pytest -q

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: academicguide
          POSTGRES_PASSWORD: ci_secret
          POSTGRES_DB: academicguide
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U academicguide"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://academicguide:ci_secret@localhost:5432/academicguide
      JWT_SECRET: ci-secret-key-32-characters-long-xx
      # E2E flow does not actually invoke an LLM; pick a provider but it
      # won't be called. We default to "openai" and leave the key empty
      # so import-time wiring is fine.
      LLM_PROVIDER: openai
      OPENAI_API_KEY: dummy
      EMBEDDING_PROVIDER: huggingface
      EMBEDDING_MODEL: BAAI/bge-m3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install --extra-index-url https://download.pytorch.org/whl/cpu torch==2.5.1
          pip install -r requirements.txt

      - name: Apply migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Start backend
        working-directory: backend
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
          for i in {1..30}; do
            if curl -fs http://localhost:8000/health; then
              echo "backend ready"; exit 0
            fi
            sleep 2
          done
          cat backend.log
          exit 1

      - name: Install + start frontend
        working-directory: frontend
        run: |
          npm ci
          nohup npm run dev -- --host 0.0.0.0 > frontend.log 2>&1 &
          for i in {1..30}; do
            if curl -fs http://localhost:5173 > /dev/null; then
              echo "frontend ready"; exit 0
            fi
            sleep 2
          done
          cat frontend.log
          exit 1

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: e2e
        env:
          FRONTEND_URL: http://localhost:5173
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          if-no-files-found: ignore
